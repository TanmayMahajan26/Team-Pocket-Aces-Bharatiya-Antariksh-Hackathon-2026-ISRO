version: '3.8'

services:
  api:
    build: .
    container_name: isro-radiation-api
    ports:
      - "8000:8000"
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    volumes:
      - ./outputs:/app/outputs
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: always

  frontend:
    build: .
    container_name: isro-radiation-dashboard
    ports:
      - "8501:8501"
    command: python -m streamlit run app/dashboard.py --server.fileWatcherType=none --server.address=0.0.0.0
    volumes:
      - ./outputs:/app/outputs
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: always
